{{define "targets.html"}}
{{template "head" .}}
<section class="resource-stack">
  <details class="panel create-disclosure" {{if not .Targets}}open{{end}}>
    <summary><span><b>添加推理目标</b></span><i aria-hidden="true">+</i></summary>
    <form method="post" action="/targets" class="form-grid compact-form" data-target-form>
      <label><span class="field-title">目标名称 <button class="field-help" type="button" aria-label="目标名称说明" data-help="用于在运行记录和报告中识别这套接口配置，不会发送给模型服务。">?</button></span><input name="name" required placeholder="例如：生产环境 · DeepSeek"></label>
      <label><span class="field-title">协议类型 <button class="field-help" type="button" aria-label="协议类型说明" data-help="OpenAI 兼容按 Chat Completions 标准发送；自定义兼容可额外读取顶层内容字段和命名 SSE 事件。">?</button></span><select name="protocol" data-protocol><option value="openai">OpenAI 兼容</option><option value="custom">自定义兼容</option></select></label>
      <label class="wide"><span class="field-title">Chat Completions 完整地址 <button class="field-help" type="button" aria-label="接口地址说明" data-help="填写可直接接收 POST 请求的完整端点，不是控制台首页或只到 /v1 的基础地址。">?</button></span><input type="url" name="url" required placeholder="https://api.example.com/v1/chat/completions"></label>
      <label><span class="field-title">模型标识 <button class="field-help" type="button" aria-label="模型标识说明" data-help="作为请求体中的 model 字段原样发送，必须与服务端已部署的模型名称一致。">?</button></span><input name="model" required placeholder="例如：deepseek-chat"></label>
      <label><span class="field-title">API Key <button class="field-help" type="button" aria-label="API Key 说明" data-help="保存后仅在服务端用于 Authorization 请求头，页面和 JSON API 不会回显密钥。">?</button></span><input type="password" name="api_key" autocomplete="new-password" placeholder="sk-...（可留空）"></label>
      <details class="wide advanced-fields" data-target-advanced>
        <summary><span>高级请求配置</span></summary>
        <div class="advanced-grid">
          <div class="wide custom-fields" data-custom-fields hidden>
            <label><span class="field-title">顶层内容字段 <button class="field-help" type="button" aria-label="顶层内容字段说明" data-help="自定义协议会将用户提示词写入请求体的这个顶层字段，同时仍保留标准 messages。">?</button></span><input name="custom_content_field" value="content" placeholder="content"></label>
          </div>
          <label class="wide"><span class="field-title">额外请求头 JSON <button class="field-help" type="button" aria-label="额外请求头说明" data-help="补充租户、应用或网关要求的请求头。系统管理的 Authorization 可能覆盖同名字段。">?</button></span><textarea name="extra_headers_json" rows="3" spellcheck="false" placeholder='{"X-Tenant-ID":"demo"}'></textarea></label>
          <label class="wide"><span class="field-title">额外请求体 JSON <button class="field-help" type="button" aria-label="额外请求体说明" data-help="这些字段会与系统生成的请求体合并，用于传递供应商专有参数。">?</button></span><textarea name="extra_body_json" rows="3" spellcheck="false" placeholder='{"response_format":{"type":"text"}}'></textarea></label>
        </div>
      </details>
      <div class="wide form-actions"><button class="button primary" type="submit">保存推理目标 <span>→</span></button></div>
    </form>
  </details>

  <div class="panel list-panel resource-list-panel">
    <div class="panel-head"><h2>已登记目标</h2></div>
    {{if .Targets}}
    <div class="card-list">
      {{range .Targets}}
      <article class="target-card">
        <div class="protocol-badge {{.Protocol}}">{{if eq .Protocol "openai"}}OA{{else}}CX{{end}}</div>
        <div class="card-main"><h3>{{.Name}}</h3><p>{{.URL}}</p><div class="tags"><span>{{.Protocol}}</span><span>{{.Model}}</span>{{if .HasAPIKey}}<span>KEY SET</span>{{end}}</div></div>
        <form method="post" action="/targets/{{.ID}}/delete" onsubmit="return confirm('确认删除这个推理目标？')"><button class="icon-button" title="删除" aria-label="删除">×</button></form>
      </article>
      {{end}}
    </div>
    {{else}}<div class="empty"><b>暂无推理目标</b></div>{{end}}
  </div>
</section>
{{template "foot" .}}
{{end}}
